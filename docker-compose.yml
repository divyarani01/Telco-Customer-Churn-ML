version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./notebooks/mlflow.db:/app/notebooks/mlflow.db:ro
      - ./models:/app/models:ro
    environment:
      PYTHONPATH: /app/src
      MLFLOW_TRACKING_URI: sqlite:////app/notebooks/mlflow.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.11-slim
    container_name: churn-mlflow
    command:
      - sh
      - -c
      - "pip install mlflow --quiet && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////data/mlflow.db"
    ports:
      - "5000:5000"
    volumes:
      - ./notebooks/mlflow.db:/data/mlflow.db
    restart: unless-stopped
